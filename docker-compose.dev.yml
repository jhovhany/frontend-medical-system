services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: medical-frontend:dev
    container_name: medical_frontend_dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Sistema Medico Frontend (Dev)}
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_AUTH_LOGIN_PATH: ${VITE_AUTH_LOGIN_PATH:-auth/login}
      VITE_AUTH_ME_PATH: ${VITE_AUTH_ME_PATH:-auth/me}
      VITE_AUTH_REFRESH_PATH: ${VITE_AUTH_REFRESH_PATH:-auth/refresh}
      VITE_ENABLE_REFRESH: ${VITE_ENABLE_REFRESH:-true}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://host.docker.internal:8000}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-300}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - shared_backend

volumes:
  frontend_node_modules:

networks:
  shared_backend:
    name: ${SHARED_DOCKER_NETWORK:-medical_shared_network}
    external: true
