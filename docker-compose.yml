services:
  frontend:
    build:
      context: .
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Sistema Medico Frontend}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_AUTH_LOGIN_PATH: ${VITE_AUTH_LOGIN_PATH:-auth/login}
        VITE_AUTH_ME_PATH: ${VITE_AUTH_ME_PATH:-auth/me}
        VITE_AUTH_REFRESH_PATH: ${VITE_AUTH_REFRESH_PATH:-auth/refresh}
        VITE_ENABLE_REFRESH: ${VITE_ENABLE_REFRESH:-true}
    image: medical-frontend:latest
    container_name: medical_frontend
    ports:
      - "5173:80"
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - shared_backend

networks:
  shared_backend:
    name: ${SHARED_DOCKER_NETWORK:-medical_shared_network}
    external: true
